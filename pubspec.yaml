name: warehouse_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  synchronized: ^3.4.0
  google_sign_in: ^7.2.0
  googleapis: ^15.0.0
  googleapis_auth: ^2.0.0
  crypto: ^3.0.3
  sqflite: ^2.3.0
  flutter_localization: ^0.2.1
  path_provider: ^2.1.1
  path: ^1.8.0
  intl: ^0.20.2
  awesome_notifications: ^0.11.0
  pdf: ^3.11.1
  file_picker: ^10.3.8
  bcrypt: ^1.1.3
  excel: ^4.0.0
  permission_handler: ^11.3.1
  local_auth: ^2.2.0
  shared_preferences: ^2.3.2
  share_plus: ^7.2.2
  url_launcher: ^6.3.0
  barcode_widget: ^2.0.4
  printing: ^5.14.0
  barcode: ^2.2.7
  google_fonts: ^6.2.1
  mobile_scanner: ^5.2.1
  get_storage: ^2.1.1
  flutter_secure_storage: ^9.2.2
  fl_chart: ^0.68.0
  firebase_core:
  google_generative_ai: ^0.4.7
  flutter_riverpod: ^2.4.0
  flutter_dotenv: ^6.0.1
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "image/g.png"
  # --- الحل السحري للحواف (Adaptive Icons) ---
  adaptive_icon_background: "#173459" # 💡 لون الخلفية (تم استخراج درجة الكحلي تقريبياً من صورتك)
  adaptive_icon_foreground: "image/g.png" # صورتك التي ستكون في المقدمة

flutter:
  uses-material-design: true

  assets:
    - .env   # ✅ أضف هذا السطر

  fonts:
    - family: Alyamama
      fonts:
        - asset: assets/fonts/Alyamama-Regular.ttf
          weight: 400
        - asset: assets/fonts/Alyamama-Bold.ttf
          weight: 700

    - family: NotoNaskhArabic
      fonts:
        - asset: assets/fonts/NotoNaskhArabic-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoNaskhArabic-Bold.ttf
          weight: 700